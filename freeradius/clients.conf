# FreeRADIUS clients.conf — NAS Client Definitions
# Letakkan di: /etc/freeradius/3.0/clients.conf
# Atau include dari radiusd.conf: $INCLUDE clients.conf

# ─── Localhost (untuk testing) ────────────────────────────────────────────────
client localhost {
    ipaddr          = 127.0.0.1
    secret          = testing123
    shortname       = localhost
    nas_type        = other
}

# ─── MikroTik Router (Hotspot/PPPoE NAS) ─────────────────────────────────────
# Ganti IP sesuai IP MikroTik kamu
client mikrotik {
    ipaddr          = 192.168.88.1
    secret          = testing123
    shortname       = mikrotik
    nas_type        = other
    require_message_authenticator = no
}

# ─── Subnet lokal (untuk development) ────────────────────────────────────────
# Hapus atau batasi di produksi!
client localnet {
    ipaddr          = 192.168.1.0/24
    secret          = testing123
    shortname       = local
    nas_type        = other
}

# ─── Docker Network (jika FreeRADIUS di container) ───────────────────────────
client docker {
    ipaddr          = 172.16.0.0/12
    secret          = testing123
    shortname       = docker
    nas_type        = other
}
