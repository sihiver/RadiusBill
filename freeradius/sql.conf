# FreeRADIUS SQL Module — PostgreSQL Configuration
# Letakkan di: /etc/freeradius/3.0/mods-available/sql
# Kemudian aktifkan: ln -s /etc/freeradius/3.0/mods-available/sql /etc/freeradius/3.0/mods-enabled/sql

sql {
    # Driver PostgreSQL
    driver = "rlm_sql_postgresql"

    dialect = "postgresql"

    # Koneksi PostgreSQL — sesuaikan dengan .env backend
    server   = "localhost"
    port     = 5432
    login    = "radius"
    password = "radpass"
    radius_db = "radius"

    # Connection pool
    pool {
        start    = 5
        min      = 4
        max      = 32
        spare    = 3
        uses     = 0
        retry_delay = 30
        lifetime = 0
        idle_timeout = 60
    }

    # Table names (standard FreeRADIUS schema)
    acct_table1          = "radacct"
    acct_table2          = "radacct"
    postauth_table       = "radpostauth"
    authcheck_table      = "radcheck"
    groupcheck_table     = "radgroupcheck"
    authreply_table      = "radreply"
    groupreply_table     = "radgroupreply"
    usergroup_table      = "radusergroup"
    read_groups          = yes
    delete_stale_sessions = yes

    # Queries — using default rlm_sql_postgresql queries
    # (no need to change if using standard schema)

    # Uncomment to log ALL SQL queries (debugging only!)
    # logfile = /var/log/freeradius/sqltrace.sql

    # Group membership query
    group_membership_query = "SELECT groupname FROM radusergroup WHERE username = '%{SQL-User-Name}' ORDER BY priority ASC"
}
