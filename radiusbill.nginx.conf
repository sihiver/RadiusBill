server {
    listen 80;
    server_name your_domain_or_IP; # Ganti dengan IP Public server atau Nama Domain Anda

    # Direktori root untuk Frontend React (Vite build)
    root /var/www/biling-radius/frontend/dist;
    index index.html;

    # Gzip Compression untuk performa lebih cepat
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Aturan untuk Frontend SPA (React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy untuk Backend Node.js API
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Meneruskan IP Client asli ke backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keamanan tambahan: jangan berikan akses ke file .env atau dotfiles
    location ~ /\. {
        deny all;
    }
}
