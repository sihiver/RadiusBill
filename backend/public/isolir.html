<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi Terisolir</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            max-width: 400px;
            margin: 40px auto;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        .icon {
            font-size: 60px;
            color: #ef4444;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            color: #475569;
            margin-bottom: 25px;
        }
        strong {
            color: #dc2626;
        }
        .btn {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: none;
        }
        .btn-outline {
            background-color: transparent;
            color: #3b82f6;
            border: 2px solid #3b82f6;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        
        <h1>Koneksi Terisolir</h1>
        
        <p>
            Mohon maaf, layanan internet Anda sementara ditangguhkan karena sistem mencatat adanya 
            <strong>tunggakan tagihan bulanan</strong> yang belum diselesaikan.
        </p>

        <a href="javascript:location.reload()" class="btn">Saya Sudah Membayar (Cek)</a>
        
        <a href="#" class="btn btn-outline">Hubungi Admin</a>
    </div>

    <div class="footer">
        Powered by Billing Radius
    </div>
</body>
</html>
