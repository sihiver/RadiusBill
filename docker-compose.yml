version: '3.9'

services:
  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rtrwnet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       radius
      POSTGRES_USER:     radius
      POSTGRES_PASSWORD: radpass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radius -d radius"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rtrwnet_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Node.js Backend API ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtrwnet_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          3001
      FRONTEND_URL:  http://localhost:5173
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       radius
      DB_USER:       radius
      DB_PASSWORD:   radpass
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      JWT_SECRET:    change_this_to_a_random_secret_in_production
      RADIUS_SECRET: testing123
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── pgAdmin (Development Only) ────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rtrwnet_pgadmin
    restart: unless-stopped
    profiles: ["dev"]   # Only start with: docker-compose --profile dev up
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@rtrwnet.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
